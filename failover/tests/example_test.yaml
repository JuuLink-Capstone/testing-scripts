name: example_test
jobs:
  - host: pve
    run_after_sec: 0
    run_after_min: 0
    run_after_hr: 0
    workdir: ~/tests/example_test
    logfile: example_test.log
    cp_files: # cp_files are pathed relative to the .yaml file, copied into the workdir
      - example_file.txt
    commands:
      - echo "Starting test at time $(date)"
      - ls
      - pwd
      - cat ./example_file
